<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting to Spotify — Wallflow Radio</title>
<style>
  :root{
    --wood-1:#363636; --wood-2:#242323; --wood-3:#171717;
    --brass-1:#5c3a26; --brass-2:#795238; --brass-3:#AEA7A3;
    --cream:#EDEBE8; --cream-dim:#959595; --bg-0:#171717;
    --danger:#ff8a75;
  }
  html,body{ margin:0; height:100%; background:var(--bg-0); color:var(--cream);
    font-family:'Helvetica Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  .wrap{ height:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{
    width:100%; max-width:380px; text-align:center; padding:36px 28px; border-radius:16px;
    background: radial-gradient(140% 100% at 0% 0%, var(--wood-2), var(--wood-1) 55%, var(--wood-3) 100%);
    border:1px solid rgba(0,0,0,.5); box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .mark{
    width:44px; height:44px; margin:0 auto 18px; border-radius:50%;
    background: conic-gradient(from 210deg, var(--brass-3), var(--brass-2), var(--brass-1), var(--brass-2), var(--brass-3));
    box-shadow: inset 0 1px 2px rgba(255,255,255,.5), 0 2px 4px rgba(0,0,0,.5);
  }
  .spinner{
    width:28px; height:28px; margin:18px auto 0; border-radius:50%;
    border:3px solid rgba(237,235,232,.15); border-top-color:var(--brass-3);
    animation: spin 800ms linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  h1{ font-size:18px; margin:0 0 8px; }
  p{ font-size:13.5px; color:var(--cream-dim); line-height:1.5; margin:0; }
  .error-box{ display:none; }
  .error-box.show{ display:block; }
  .error-box p{ color:var(--danger); }
  .retry-btn{
    margin-top:18px; padding:10px 20px; border-radius:22px; border:none; cursor:pointer;
    background: linear-gradient(135deg, var(--brass-3), var(--brass-1)); color:#000; font-weight:700;
    font-size:13.5px; display:none;
  }
  .retry-btn.show{ display:inline-block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="mark"></div>
    <div id="statusBox">
      <h1>Connecting to Spotify…</h1>
      <p id="statusMsg">Hang tight while we finish signing you in.</p>
      <div class="spinner" id="spinner"></div>
    </div>
    <div class="error-box" id="errorBox">
      <h1>Couldn't connect</h1>
      <p id="errorMsg">Something went wrong during Spotify login.</p>
    </div>
    <button class="retry-btn" id="retryBtn">Back to Wallflow Radio</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---- Keep these in sync with spotify.js ----
  const SPOTIFY_CLIENT_ID = '6b9f72faedec431687760a74dcc91134';
  const SPOTIFY_REDIRECT_URI = 'https://sparshy66-eng.github.io/retro-radio/callback.html';
  const TOKEN_ENDPOINT = 'https://accounts.spotify.com/api/token';
  const LS_TOKENS_KEY = 'spotifyTokens';
  const SS_VERIFIER_KEY = 'spotify_code_verifier';
  const SS_STATE_KEY = 'spotify_auth_state';

  // Where to send the user once tokens are stored. Update this if your main
  // app file isn't at the site root (e.g. change to './wallflow-radio.html').
  const APP_URL = './index.html';

  const statusBox = document.getElementById('statusBox');
  const errorBox = document.getElementById('errorBox');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');

  function showError(message) {
    statusBox.style.display = 'none';
    errorBox.classList.add('show');
    errorMsg.textContent = message;
    retryBtn.classList.add('show');
  }

  retryBtn.addEventListener('click', () => { window.location.href = APP_URL; });

  async function exchangeCodeForToken(code, codeVerifier) {
    const body = new URLSearchParams({
      grant_type: 'authorization_code',
      code: code,
      redirect_uri: SPOTIFY_REDIRECT_URI,
      client_id: SPOTIFY_CLIENT_ID,
      code_verifier: codeVerifier
    });

    const res = await fetch(TOKEN_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`Token exchange failed (${res.status}): ${text}`);
    }
    return res.json();
  }

  async function run() {
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const code = params.get('code');
    const state = params.get('state');

    if (error) {
      showError(error === 'access_denied'
        ? 'You declined the Spotify login request.'
        : `Spotify returned an error: ${error}`);
      return;
    }

    if (!code) {
      showError('No authorization code was returned by Spotify.');
      return;
    }

    const expectedState = sessionStorage.getItem(SS_STATE_KEY);
    const codeVerifier = sessionStorage.getItem(SS_VERIFIER_KEY);

    if (!codeVerifier || !expectedState) {
      showError('Login session expired or this page was opened directly. Please try logging in again.');
      return;
    }

    if (state !== expectedState) {
      showError('Security check failed (state mismatch). Please try logging in again.');
      return;
    }

    try {
      const data = await exchangeCodeForToken(code, codeVerifier);

      const tokens = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: Date.now() + (data.expires_in * 1000)
      };
      localStorage.setItem(LS_TOKENS_KEY, JSON.stringify(tokens));

      // Clean up one-time PKCE values — they're single-use.
      sessionStorage.removeItem(SS_VERIFIER_KEY);
      sessionStorage.removeItem(SS_STATE_KEY);

      // Strip the ?code=...&state=... from the URL, then head back to the app.
      window.history.replaceState({}, document.title, window.location.pathname);
      window.location.href = APP_URL;
    } catch (err) {
      console.error(err);
      showError('Could not exchange the authorization code for a token. See console for details.');
    }
  }

  run();
})();
</script>
</body>
</html>
